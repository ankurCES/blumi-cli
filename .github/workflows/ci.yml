name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust gate (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      # NOTE: do NOT use `--all-features` on Linux. It force-enables the
      # platform-specific embedder features — `gpu-coreml` (an Apple-only ONNX
      # Runtime symbol, `OrtSessionOptionsAppendExecutionProvider_CoreML`) and
      # `gpu-cuda` (needs the CUDA toolkit) — neither of which links here. Those
      # are target-gated on in the `blumi` crate (macOS-aarch64) and opt-in
      # elsewhere; CI lints/tests the default build + the CPU bundled embedder.
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Build (bundled CPU embeddings — the Linux-safe optional feature)
        run: cargo build -p blumi-llm --features local-embeddings

  flutter:
    name: blugo (analyze + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blugo
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true
      - name: Pub get
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
