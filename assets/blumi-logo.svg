<svg xmlns="http://www.w3.org/2000/svg" width="560" height="170" viewBox="0 0 560 170" fill="none" role="img" aria-label="blumi — the local-first agentic coding companion">
  <title>blumi</title>
  <defs>
    <!-- Living Rose petal ramp: rose → lavender → violet → cyan (the TUI palette) -->
    <linearGradient id="bloom" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF4F87"/>
      <stop offset="0.45" stop-color="#9B86FF"/>
      <stop offset="0.75" stop-color="#6B50FF"/>
      <stop offset="1" stop-color="#68FFD6"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF4F87"/>
      <stop offset="0.35" stop-color="#9B86FF"/>
      <stop offset="0.65" stop-color="#6B50FF"/>
      <stop offset="1" stop-color="#68FFD6"/>
    </linearGradient>
  </defs>

  <!-- flower mark: an eight-petal bloom around a cyan nucleus (✿/❀/◉) -->
  <g transform="translate(85 78)" fill="url(#bloom)">
    <ellipse cx="0" cy="-36" rx="19" ry="33"/>
    <ellipse cx="0" cy="36" rx="19" ry="33"/>
    <ellipse cx="-36" cy="0" rx="33" ry="19"/>
    <ellipse cx="36" cy="0" rx="33" ry="19"/>
    <ellipse cx="-26" cy="-26" rx="28" ry="15" transform="rotate(45 -26 -26)"/>
    <ellipse cx="26" cy="26" rx="28" ry="15" transform="rotate(45 26 26)"/>
    <ellipse cx="26" cy="-26" rx="28" ry="15" transform="rotate(-45 26 -26)"/>
    <ellipse cx="-26" cy="26" rx="28" ry="15" transform="rotate(-45 -26 26)"/>
  </g>
  <!-- nucleus ◉ -->
  <circle cx="85" cy="78" r="17" fill="#68FFD6"/>
  <circle cx="85" cy="78" r="7.5" fill="#0E1116"/>

  <!-- wordmark -->
  <text x="168" y="92" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="76" font-weight="800" letter-spacing="1.5" fill="url(#word)">blumi</text>
  <!-- tagline (mid-gray reads on both light and dark) -->
  <text x="171" y="126" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="16.5" font-weight="500" letter-spacing="0.5" fill="#8B8FA3">the local-first agentic coding companion</text>
</svg>
