<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="blugo">
  <defs>
    <!-- Living Rose petal ramp: rose → lavender → violet → cyan (the blumi palette) -->
    <linearGradient id="bloom" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF4F87"/>
      <stop offset="0.45" stop-color="#9B86FF"/>
      <stop offset="0.75" stop-color="#6B50FF"/>
      <stop offset="1" stop-color="#68FFD6"/>
    </linearGradient>
  </defs>

  <!-- dark rounded backdrop (rose-bg) -->
  <rect width="1024" height="1024" rx="224" fill="#16090E"/>

  <!-- eight-petal bloom around a cyan nucleus, centered + scaled to fill -->
  <g transform="translate(512 512) scale(5)">
    <g fill="url(#bloom)">
      <ellipse cx="0" cy="-36" rx="19" ry="33"/>
      <ellipse cx="0" cy="36" rx="19" ry="33"/>
      <ellipse cx="-36" cy="0" rx="33" ry="19"/>
      <ellipse cx="36" cy="0" rx="33" ry="19"/>
      <ellipse cx="-26" cy="-26" rx="28" ry="15" transform="rotate(45 -26 -26)"/>
      <ellipse cx="26" cy="26" rx="28" ry="15" transform="rotate(45 26 26)"/>
      <ellipse cx="26" cy="-26" rx="28" ry="15" transform="rotate(-45 26 -26)"/>
      <ellipse cx="-26" cy="26" rx="28" ry="15" transform="rotate(-45 -26 26)"/>
    </g>
    <circle cx="0" cy="0" r="17" fill="#68FFD6"/>
    <circle cx="0" cy="0" r="7.5" fill="#0E1116"/>
  </g>
</svg>
